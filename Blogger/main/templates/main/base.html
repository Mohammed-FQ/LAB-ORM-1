{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}title{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
    
</head>
<body data-bs-theme="{% if 'mode' in request.COOKIES and request.COOKIES.mode == 'dark' %}dark{% else %}light{% endif %}">
    <nav class="navbar navbar-expand-lg nav-style">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <a class="navbar-brand" href="{% url 'main:posts_view' %}">Blogger</a>
            <div class="d-flex align-items-center gap-3">
                <a class="nav-link-custom" href="{% url 'main:posts_view' %}">Posts</a>
                <a class="nav-link-custom" href="{% url 'main:create_post_view' %}">New Post</a>
                <div class="theme-toggle-form footer-theme-toggle">
                <a
                  class="theme-toggle-button"
                  href="{% if 'mode' in request.COOKIES and request.COOKIES.mode == 'dark' %}{% url 'main:mode_view' 'light' %}{% else %}{% url 'main:mode_view' 'dark' %}{% endif %}?next={{ request.path }}"
                  aria-label="Switch to {% if 'mode' in request.COOKIES and request.COOKIES.mode == 'dark' %}light{% else %}dark{% endif %} mode"
                >
                  {% if 'mode' in request.COOKIES and request.COOKIES.mode == 'dark' %}
                  Light Mode
                  {% else %}
                  Dark Mode
                  {% endif %}
                </a>
            </div>
            </div>
        </div>
    </nav>
    {% block content %} 
    {% endblock %}
    <footer>
        <div class="sticky-bottom footer-style">
            <div class="container-fluid text-center">
                <p>Join the community</p>
            </div>
        </div>
    </footer>
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
